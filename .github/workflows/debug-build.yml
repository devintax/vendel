name: Debug Build

on:
  push:
    tags:
      - "debug-*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APKs
        run: ./gradlew assembleDebug

      - name: Rename APKs
        run: |
          VERSION="${GITHUB_REF_NAME#debug-}"
          cd app/build/outputs/apk/debug
          mv app-universal-debug.apk "vendel-v${VERSION}-debug-universal.apk" || true
          mv app-arm64-v8a-debug.apk "vendel-v${VERSION}-debug-arm64-v8a.apk" || true
          mv app-armeabi-v7a-debug.apk "vendel-v${VERSION}-debug-armeabi-v7a.apk" || true
          mv app-x86_64-debug.apk "vendel-v${VERSION}-debug-x86_64.apk" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Vendel Debug ${{ github.ref_name }}"
          prerelease: true
          files: app/build/outputs/apk/debug/vendel-*.apk
