name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > vendel-release.jks

      - name: Create keystore.properties
        run: |
          echo "storeFile=${{ github.workspace }}/vendel-release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Build release APKs
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd app/build/outputs/apk/release
          mv app-universal-release.apk "vendel-v${VERSION}-universal.apk"
          mv app-arm64-v8a-release.apk "vendel-v${VERSION}-arm64-v8a.apk"
          mv app-armeabi-v7a-release.apk "vendel-v${VERSION}-armeabi-v7a.apk"
          mv app-x86_64-release.apk "vendel-v${VERSION}-x86_64.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Vendel ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: app/build/outputs/apk/release/vendel-*.apk
